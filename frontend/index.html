<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ecotrack</title>
</head>
<body>
    <div id="app"></div>

    <script>
        let currentPage = 'login';
        let hasSession = false;

        const app = document.getElementById('app');

        const renderLogin = () => {
            app.innerHTML = `
                <div style="padding: 2rem">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <label>Email:</label><br>
                        <input id="email" placeholder="email"><br><br>
                        <label>Password:</label><br>
                        <input id="password" type="password" placeholder="password"><br><br>
                        <button type="submit">Login</button>
                    </form>
                    <br>
                    <button onclick="navigate('register')">Don't have an account? Register</button>
                    <div id="response" style="color: green"></div>
                    <div id="error" style="color: red"></div>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                document.getElementById('response').innerText = '';
                document.getElementById('error').innerText = '';

                try {
                    const res = await fetch('/session/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            provider_user_id: document.getElementById('email').value,
                            provider_data: { password: document.getElementById('password').value },
                            provider_type_name: 'local',
                        }),
                    });

                    const data = await res.json();
                    if (!res.ok) document.getElementById('error').innerText = `Error ${res.status}: ${data.message}`;
                    else document.getElementById('response').innerText = JSON.stringify(data, null, 2);
                } catch (err) {
                    document.getElementById('error').innerText = 'Could not reach the server. Is it running?';
                }
            });
        };

        const renderRegister = () => {
            if (hasSession) {
                app.innerHTML = `
                    <div style="padding: 2rem">
                        <h2>Already logged in</h2>
                        <button onclick="navigate('login')">Go to login</button>
                    </div>
                `;
                return;
            }

            app.innerHTML = `
                <div style="padding: 2rem">
                    <h2>Register</h2>
                    <form id="registerForm">
                        <label>Name:</label><br>
                        <input id="name" placeholder="your name"><br><br>
                        <label>Email:</label><br>
                        <input id="email" placeholder="your email"><br><br>
                        <label>Password:</label><br>
                        <input id="password" type="password" placeholder="your password"><br><br>
                        <button type="submit">Register</button>
                    </form>
                    <br>
                    <button onclick="navigate('login')">Already have an account? Login</button>
                    <div id="response" style="color: green"></div>
                    <div id="error" style="color: red"></div>
                </div>
            `;

            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                document.getElementById('response').innerText = '';
                document.getElementById('error').innerText = '';

                try {
                    const res = await fetch('/user/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            name: document.getElementById('name').value,
                            email: document.getElementById('email').value,
                            password: document.getElementById('password').value,
                        }),
                    });

                    const data = await res.json();
                    if (!res.ok) document.getElementById('error').innerText = `Error ${res.status}: ${data.message}`;
                    else document.getElementById('response').innerText = JSON.stringify(data, null, 2);
                } catch (err) {
                    document.getElementById('error').innerText = 'Could not reach the server. Is it running?';
                }
            });
        };

        const navigate = (page) => {
            currentPage = page;
            if (page === 'login') renderLogin();
            if (page === 'register') renderRegister();
        };

        // check for existing session on startup
        fetch('/session/refresh', {
            method: 'POST',
            credentials: 'include',
        })
        .then(res => res.json())
        .then(data => {
            if (data.message === 'Session refreshed') hasSession = true;
            navigate('login');
        });
    </script>
</body>
</html>
